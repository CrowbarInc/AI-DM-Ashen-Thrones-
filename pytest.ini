[pytest]
addopts = -q
testpaths = tests
pythonpath = .
markers =
    unit: Fast, narrowly scoped tests (pure logic or small helpers).
    integration: API, storage, or multi-component / pipeline coverage.
    regression: Historical bug or behavior locks.
    transcript: Multi-turn transcript harness or transcript gauntlet flows.
    slow: Heavier runtime (long transcripts, many turns, large pipelines).
    brittle: Assertions sensitive to prompt copy or prose shape.
    routing: Intent / dialogue-lock / lane routing ownership.
    retry: Retry strategy or targeted retry ownership.
    fallback: Uncertainty or terminal fallback ownership.
    social: Social exchange / NPC interaction ownership.
    continuity: Session or dialogue continuity ownership.
    clues: Clue discovery / inference ownership.
    leads: Contextual leads / follow-up memory ownership.
    emission: Resolution payload / final emission / trace ownership.
    legality: Sanitizer, validator voice, guard, spoiler safety ownership.
